<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{general/fragmentos :: head}"></th:block>
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0" th:text="${solicitudIngreso.idSolicitud != null ? 'Editar Solicitud' : 'Formulario de Solicitud de Ingreso'}">
                    Formulario de Solicitud
                </h4>
            </div>
            <div class="card-body">
                <form th:action="@{/solicitudIngreso/guardar}" th:object="${solicitudIngreso}" method="post">

                    <input type="hidden" th:field="*{idSolicitud}">

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nombre:</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Primer Apellido:</label>
                            <input type="text" class="form-control" th:field="*{primerApellido}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Segundo Apellido:</label>
                            <input type="text" class="form-control" th:field="*{segundoApellido}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Correo:</label>
                            <input type="email" class="form-control" th:field="*{correo}"
                                   placeholder="ejemplo@correo.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teléfono:</label>
                            <input type="tel" class="form-control" th:field="*{telefono}"
                                   placeholder="8888-8888" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Banda:</label>
                            <select class="form-select" name="idBanda" required>
                                <option value="">-- Seleccione banda --</option>
                                <option th:each="b : ${bandas}" th:value="${b.idBanda}" th:text="${b.nombre}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sección:</label>
                            <select class="form-select" name="idSeccion" required>
                                <option value="">-- Seleccione sección --</option>
                                <option th:each="s : ${secciones}" th:value="${s.idSeccion}" th:text="${s.nombre}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mensaje:</label>
                        <textarea class="form-control" th:field="*{mensaje}" rows="4"
                                  placeholder="Contanos por qué querés unirte a la banda..."></textarea>
                    </div>

                    <div class="text-end">
                        <a th:href="@{/audiciones/listado}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Enviar Solicitud</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
