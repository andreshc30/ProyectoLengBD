<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:replace="~{general/fragmentos :: head}"></head>

<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <section>
        <section class="seccion-info">
            <div class="container">
                <div class="card text-center panel">
                    <div class="card-header bg-transparent border-0">
                        <ul class="nav nav-tabs card-header-tabs justify-content-center" id="infoTabs" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#nosotros" type="button">Nosotros</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#vision" type="button">Visión</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#mision" type="button">Misión</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body tab-content">
                        <div class="tab-pane fade show active" id="nosotros">
                            <h5 class="card-title seccion-titulo">Sobre la Banda</h5>
                            <p class="card-text seccion-texto"></p>
                        </div>
                        <div class="tab-pane fade" id="vision">
                            <h5 class="card-title seccion-titulo">Nuestra Visión</h5>
                            <p class="card-text seccion-texto"></p>
                        </div>
                        <div class="tab-pane fade" id="mision">
                            <h5 class="card-title seccion-titulo">Nuestra Misión</h5>
                            <p class="card-text seccion-texto"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
