<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionAsistenciaEnsayo">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Asistencia a ensayo</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaAsistenciaEnsayo">
                <i class="ti ti-plus"></i> Nuevo registro
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Ensayo</th>
                    <th>Integrante</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${asistenciasEnsayo}">
                    <td th:text="${a.nombreEnsayo}"></td>
                    <td th:text="${a.nombreUsuario}"></td>
                    <td th:text="${a.nombreEstado}"></td>
                    <td>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary js-editar"
                                data-bs-toggle="modal" data-bs-target="#modalEditarAsistenciaEnsayo"
                                th:attr="data-id-asistencia-ensayos=${a.idAsistenciaEnsayos},
                                         data-id-ensayo=${a.idEnsayo},
                                         data-cedula=${a.cedula},
                                         data-id-estado=${a.idEstado}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger js-eliminar"
                                data-bs-toggle="modal" data-bs-target="#modalEliminarAsistenciaEnsayo"
                                th:attr="data-id-asistencia-ensayos=${a.idAsistenciaEnsayos}, data-nombre-mostrar=${a.nombreUsuario}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(asistenciasEnsayo)}">
                    <td colspan="5" class="text-center text-muted">No hay registros de asistencia.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nuevo registro -->
        <div class="modal fade" id="modalNuevaAsistenciaEnsayo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asistenciaEnsayo/guardar}" th:object="${nuevaAsistenciaEnsayo}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nuevo registro de asistencia</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Ensayo</label>
                                <select class="form-select" th:field="*{idEnsayo}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="e : ${ensayos}" th:value="${e.idEnsayo}" th:text="${e.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" th:field="*{cedula}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEditarAsistenciaEnsayo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asistenciaEnsayo/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar registro de asistencia</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idAsistenciaEnsayos">
                            <div class="mb-3">
                                <label class="form-label">Ensayo</label>
                                <select class="form-select" name="idEnsayo">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="e : ${ensayos}" th:value="${e.idEnsayo}" th:text="${e.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" name="cedula">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEliminarAsistenciaEnsayo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar registro de asistencia</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar este registro de <strong class="js-nombre-registro"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/asistenciaEnsayo/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idAsistenciaEnsayos">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
