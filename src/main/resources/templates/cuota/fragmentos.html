<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <div th:fragment="gestionCuota">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5>Cuota</h5>
                <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaCuota">
                    <i class="ti ti-plus"></i> Nueva Cuota
                </button>
            </div>

            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th>Cedula</th>
                        <th>Nombre del Usuario</th>
                        <th>Fecha</th>
                        <th>Monto Pagado</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${cuotas}">
                        <td th:text="${c.cedula}"></td>
                        <td th:text="${c.nombreUsuario}"></td>
                        <td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy')}"></td>
                        <td th:text="${c.montoPagado}"></td>
                        <td th:text="${c.estado}"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${c.idCuota}">
                                <i class="ti ti-edit"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${c.idCuota}">
                                <i class="ti ti-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cuotas)}">
                        <td colspan="5" class="text-center text-muted">No hay cuotas registrados.</td>
                    </tr>
                </tbody>
            </table>

            <!-- Modal: nuevo pago -->
            <div class="modal fade" id="modalNuevaCuota" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/cuota/guardar}" th:object="${nuevaCuota}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Nueva Cuota</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Cedula</label>
                                    <select class="form-select" th:field="*{cedula}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.cedula} + ' - ' + ${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" class="form-control" th:field="*{fecha}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Monto Pagado</label>
                                    <input type="number" step='0.01' class="form-control" th:field="*{montoPagado}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" th:field="*{idEstado}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: editar movimiento (uno por fila) -->
            <div class="modal fade" th:each="c : ${cuotas}" th:id="'modalEditar-' + ${c.idCuota}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/cuota/guardar}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Editar Cuota</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="idCuota" th:value="${c.idCuota}">
                                <div class="mb-3">
                                    <label class="form-label">Cedula</label>
                                    <select class="form-select" name="cedula">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.cedula} + ' - ' + ${u.nombre} + ' ' + ${u.primerApellido} " th:selected="${u.cedula == c.cedula}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" name="fecha" class="form-control" th:value="${c.fecha}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Monto Pagado</label>
                                    <input type="number" step='0.01' name="montoPagado" class="form-control" th:value="${c.montoPagado}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" name="idEstado">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == c.idEstado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: confirmar eliminación (uno por fila) -->
            <div class="modal fade" th:each="c : ${cuotas}" th:id="'modalEliminar-' + ${c.idCuota}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Eliminar Cuota</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Estás seguro de que querés eliminar la cuota? Esta acción no se puede deshacer.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <form th:action="@{/cuota/eliminar}" method="post" class="d-inline">
                                <input type="hidden" name="idCuota" th:value="${c.idCuota}">
                                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </body>
</html>
