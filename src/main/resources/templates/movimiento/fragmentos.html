<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <div th:fragment="gestionMovimiento">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5>Movimientos</h5>
                <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoMovimiento">
                    <i class="ti ti-plus"></i> Nuevo Movimiento
                </button>
            </div>

            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th>Cantidad</th>
                        <th>Fecha</th>
                        <th>Detalle</th>
                        <th>Categoría Movimiento</th>
                        <th>Metodo Pago</th>
                        <th>Banda</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${movimientos}">
                        <td th:text="${m.cantidad}"></td>
                        <td th:text="${#temporals.format(m.fecha, 'dd/MM/yyyy')}"></td>
                        <td th:text="${m.detalle}"></td>
                        <td th:text="${m.nombreCategoriaMovimiento}"></td>
                        <td th:text="${m.nombreMetodoPago}"></td>
                        <td th:text="${m.nombreBanda}"></td>
                        <td th:text="${m.estado}"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${m.idMovimiento}">
                                <i class="ti ti-edit"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${m.idMovimiento}">
                                <i class="ti ti-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(movimientos)}">
                        <td colspan="9" class="text-center text-muted">No hay movimientos registrados.</td>
                    </tr>
                </tbody>
            </table>

            <!-- Modal: nuevo pago -->
            <div class="modal fade" id="modalNuevoMovimiento" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/movimiento/guardar}" th:object="${nuevoMovimiento}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Nuevo Movimiento</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Cantidad</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{cantidad}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" class="form-control" th:field="*{fecha}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Detalle</label>
                                    <input type="text" class="form-control" th:field="*{detalle}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Categoría de Movimiento</label>
                                    <select class="form-select" th:field="*{idCategoriaMovimiento}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="c : ${categoriasMovimientos}" th:value="${c.idCategoriaMovimiento}" th:text="${c.nombre}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Método de Pago</label>
                                    <select class="form-select" th:field="*{idMetodoPago}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="me : ${metodosPagos}" th:value="${me.idMetodoPago}" th:text="${me.nombre}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Banda</label>
                                    <select class="form-select" th:field="*{idBanda}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="b : ${bandas}" th:value="${b.idBanda}" th:text="${b.nombre}"></option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" th:field="*{idEstado}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: editar movimiento (uno por fila) -->
            <div class="modal fade" th:each="m : ${movimientos}" th:id="'modalEditar-' + ${m.idMovimiento}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/movimiento/guardar}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Editar Movimiento</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="idMovimiento" th:value="${m.idMovimiento}">
                                <div class="mb-3">
                                    <div class="mb-3">
                                        <label class="form-label">Cantidad</label>
                                        <input type="number" step="0.01" name="cantidad" class="form-control" th:value="${m.cantidad}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" name="fecha" class="form-control" th:value="${m.fecha}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Detalle</label>
                                    <input type="text" name="total" class="form-control" th:value="${m.Detalle}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Categoria Movimiento</label>
                                    <select class="form-select" name="idCategoriaMovimiento">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each=" c: ${categoriasMovimientos}" th:value="${c.idCategoriaMovimiento}" th:text="${c.nombre}" th:selected="${c.idCategoriaMovimiento == m.idCategoriaMovimiento}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Método de Pago</label>
                                    <select class="form-select" name="idMetodoPago">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="me : ${metodosPagos}" th:value="${me.idMetodoPago}" th:text="${me.nombre}" th:selected="${me.idMetodoPago == m.idMetodoPago}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Banda</label>
                                    <select class="form-select" name="idBanda">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="b : ${bandas}" th:value="${b.idBanda}" th:text="${b.nombre}" th:selected="${b.idBanda == m.idBanda}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" name="idEstado">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == m.idEstado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: confirmar eliminación (uno por fila) -->
            <div class="modal fade" th:each="m : ${movimientos}" th:id="'modalEliminar-' + ${m.idMovimiento}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Eliminar Movimiento</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Estás seguro de que querés eliminar el movimiento? Esta acción no se puede deshacer.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <form th:action="@{/movimiento/eliminar}" method="post" class="d-inline">
                                <input type="hidden" name="idMovimiento" th:value="${m.idMovimiento}">
                                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </body>
</html>
