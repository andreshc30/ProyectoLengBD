<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>
    
    <main class="container my-5">
        <div class="card shadow col-md-8 mx-auto">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0" th:text="${suscripcion.idSuscripcion != null ? 'Editar Suscripción' : 'Nueva Suscripción'}"></h4>
            </div>
            <div class="card-body">
                
                <form th:action="${suscripcion.idSuscripcion != null ? '/suscripcion/actualizar' : '/suscripcion/guardar'}" 
                      th:object="${suscripcion}" method="POST">
                    
                    <input type="hidden" th:field="*{idSuscripcion}" />
                    <input type="hidden" th:field="*{idEstado}" />

                    <div class="mb-3">
                        <label class="form-label">Nombre de la Suscripción</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Fecha de Inicio</label>
                            <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha Final</label>
                            <input type="date" class="form-control" th:field="*{fechaFinal}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">¿Auto Renovar?</label>
                            <select class="form-select" th:field="*{autoRenovar}">
                                <option value="1">Sí</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ID del Plan</label>
                            <input type="number" class="form-control" th:field="*{idTipoPlan}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ID del Pago</label>
                            <input type="number" class="form-control" th:field="*{idPagoSuscripcion}" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a th:href="@{/suscripcion/listado}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
