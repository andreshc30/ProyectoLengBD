<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionRolUsuario">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Rol de usuario</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoRolUsuario">
                <i class="ti ti-plus"></i> Nuevo registro
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ru : ${rolesUsuarios}">
                    <td th:text="${ru.nombreUsuario}"></td>
                    <td th:text="${ru.nombreRol}"></td>
                    <td th:text="${ru.estado}"></td>
                    <td>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary js-editar"
                                data-bs-toggle="modal" data-bs-target="#modalEditarRolUsuario"
                                th:attr="data-cedula=${ru.cedula}, data-id-rol=${ru.idRol}, data-id-estado=${ru.idEstado}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger js-eliminar"
                                data-bs-toggle="modal" data-bs-target="#modalEliminarRolUsuario"
                                th:attr="data-cedula=${ru.cedula}, data-id-rol=${ru.idRol}, data-nombre-mostrar=${ru.nombreUsuario} + ' - ' + ${ru.nombreRol}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(rolesUsuarios)}">
                    <td colspan="5" class="text-center text-muted">No hay registros de rol de usuario.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nuevo registro -->
        <div class="modal fade" id="modalNuevoRolUsuario" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/rolUsuario/guardar}" th:object="${nuevoRolUsuario}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nuevo rol de usuario</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="editando" value="false">
                            <div class="mb-3">
                                <label class="form-label">Usuario (cédula)</label>
                                <select class="form-select" th:field="*{cedula}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select class="form-select" th:field="*{idRol}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="r : ${roles}" th:value="${r.idRol}" th:text="${r.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEditarRolUsuario" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/rolUsuario/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar rol de usuario</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="editando" value="true">
                            <div class="mb-3">
                                <label class="form-label">Usuario (cédula)</label>
                                <select class="form-select" name="cedula">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select class="form-select" name="idRol">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="r : ${roles}" th:value="${r.idRol}" th:text="${r.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEliminarRolUsuario" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar rol de usuario</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar <strong class="js-nombre-registro"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/rolUsuario/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="cedula">
                            <input type="hidden" name="idRol">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
