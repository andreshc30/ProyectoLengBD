<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <div th:fragment="gestionDireccion">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5>Dirección</h5>
                <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaDireccion">
                    <i class="ti ti-plus"></i> Nueva Dirección
                </button>
            </div>

            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th>Provincia</th>
                        <th>Cantón</th>
                        <th>Distrito</th>
                        <th>Otros Detalles</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${direcciones}">
                        <td th:text="${d.provincia}"></td>
                        <td th:text="${d.canton}"></td>
                        <td th:text="${d.distrito}"></td>
                        <td th:text="${d.otrosDetalles}"></td>
                        <td th:text="${d.estado}"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${d.idDireccion}">
                                <i class="ti ti-edit"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${d.idDireccion}">
                                <i class="ti ti-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(direcciones)}">
                        <td colspan="6" class="text-center text-muted">No hay direcciones registradas.</td>
                    </tr>
                </tbody>
            </table>

            <!-- Modal: nueva dirección -->
            <div class="modal fade" id="modalNuevaDireccion" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/direccion/guardar}" th:object="${nuevaDireccion}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Nueva Dirección</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Provincia</label>
                                    <select class="form-select" th:field="*{idProvincia}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="p : ${provincias}" th:value="${p.idProvincia}" th:text="${p.nombre}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Cantón</label>
                                    <select class="form-select" th:field="*{idCanton}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="c : ${cantones}" th:value="${c.idCanton}" th:text="${c.nombre}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Distrito</label>
                                    <select class="form-select" th:field="*{idDistrito}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="di : ${distritos}" th:value="${di.idDistrito}" th:text="${di.nombre}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Otros Detalles</label>
                                    <input type="text" class="form-control" th:field="*{otrosDetalles}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" th:field="*{idEstado}">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: editar dirección (uno por fila) -->
            <div class="modal fade" th:each="d : ${direcciones}" th:id="'modalEditar-' + ${d.idDireccion}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/direccion/guardar}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Editar Dirección</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="idDireccion" th:value="${d.idDireccion}">
                                <div class="mb-3">
                                    <label class="form-label">Provincia</label>
                                    <select class="form-select" name="idProvincia">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="p : ${provincias}" th:value="${p.idProvincia}" th:text="${p.nombre}" th:selected="${p.idProvincia == d.idProvincia}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Cantón</label>
                                    <select class="form-select" name="idCanton">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="c : ${cantones}" th:value="${c.idCanton}" th:text="${c.nombre}" th:selected="${c.idCanton == d.idCanton}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Distrito</label>
                                    <select class="form-select" name="idDistrito">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="di : ${distritos}" th:value="${di.idDistrito}" th:text="${di.nombre}" th:selected="${di.idDistrito == d.idDistrito}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Otros Detalles</label>
                                    <input type="text" name="otrosDetalles" class="form-control" th:value="${d.otrosDetalles}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" name="idEstado">
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == d.idEstado}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal: confirmar eliminación (uno por fila) -->
            <div class="modal fade" th:each="d : ${direcciones}" th:id="'modalEliminar-' + ${d.idDireccion}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Eliminar Dirección</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Estás seguro de que querés eliminar la dirección? Esta acción no se puede deshacer.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <form th:action="@{/direccion/eliminar}" method="post" class="d-inline">
                                <input type="hidden" name="idDireccion" th:value="${d.idDireccion}">
                                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </body>
</html>
