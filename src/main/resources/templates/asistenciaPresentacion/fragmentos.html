<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionAsistenciaPresentacion">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Asistencia a presentación</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaAsistenciaPresentacion">
                <i class="ti ti-plus"></i> Nuevo registro
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Presentación</th>
                    <th>Integrante</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${asistenciasPresentacion}">
                    <td th:text="${a.nombrePresentacion}"></td>
                    <td th:text="${a.nombreUsuario}"></td>
                    <td th:text="${a.nombreEstado}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${a.idAsistenciaPresentacion}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${a.idAsistenciaPresentacion}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(asistenciasPresentacion)}">
                    <td colspan="5" class="text-center text-muted">No hay registros de asistencia.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nuevo registro -->
        <div class="modal fade" id="modalNuevaAsistenciaPresentacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asistenciaPresentacion/guardar}" th:object="${nuevaAsistenciaPresentacion}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nuevo registro de asistencia</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Presentación</label>
                                <select class="form-select" th:field="*{idPresentacion}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="p : ${presentaciones}" th:value="${p.idPresentacion}" th:text="${p.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" th:field="*{cedula}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar (uno por fila) -->
        <div class="modal fade" th:each="a : ${asistenciasPresentacion}" th:id="'modalEditar-' + ${a.idAsistenciaPresentacion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asistenciaPresentacion/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar registro de asistencia</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idAsistenciaPresentacion" th:value="${a.idAsistenciaPresentacion}">
                            <div class="mb-3">
                                <label class="form-label">Presentación</label>
                                <select class="form-select" name="idPresentacion">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="p : ${presentaciones}" th:value="${p.idPresentacion}" th:text="${p.nombre}" th:selected="${p.idPresentacion == a.idPresentacion}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" name="cedula">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}" th:selected="${u.cedula == a.cedula}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == a.idEstado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (uno por fila) -->
        <div class="modal fade" th:each="a : ${asistenciasPresentacion}" th:id="'modalEliminar-' + ${a.idAsistenciaPresentacion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar registro de asistencia</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar este registro de <strong th:text="${a.nombreUsuario}"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/asistenciaPresentacion/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idAsistenciaPresentacion" th:value="${a.idAsistenciaPresentacion}">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
