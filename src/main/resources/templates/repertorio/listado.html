<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>
    <main class="container my-4">
        <h2>Repertorio</h2>

        <ul class="nav nav-tabs mt-3" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabObras">Obras</button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 rounded-bottom p-3">

            <!-- TAB OBRAS -->
            <div class="tab-pane fade show active" id="tabObras">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Obras del Repertorio</h5>
                </div>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha</th>
                            <th>Detalle</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${obras}">
                            <td th:text="${o.idObra}"></td>
                            <td th:text="${o.nombre}"></td>
                            <td th:text="${o.fecha}"></td>
                            <td th:text="${o.detalle}"></td>
                            <td th:text="${o.idTipo}"></td>
                            <td th:text="${o.idEstado}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
    <footer th:replace="~{general/fragmentos :: footer}"/>
</body>
</html>
