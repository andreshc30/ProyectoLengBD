<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head>
        <th:block th:replace="~{general/fragmentos :: head}"></th:block>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>

    <body>
        <header style="background-color: #333;">
            <div class="Center">
                <div class="site-logo">
                    <h1><a th:href="@{/}">BandCore</a></h1>
                </div>
                <nav class="Navigation">
                    <ul>
                        <li><a th:href="@{/}">Inicio</a><span class="menu-item-bg"></span></li>
                        <li class="active"><a th:href="@{/solicitudes/listado}">Gestión Audiciones</a><span class="menu-item-bg"></span></li>
                        <li><a th:href="@{/banda/listado}">Banda</a><span class="menu-item-bg"></span></li>
                        <li><a th:href="@{/eventos/listado}">Eventos</a><span class="menu-item-bg"></span></li>
                    </ul>
                </nav>
                <div class="clear"></div>
            </div>
        </header>

        <section style="padding: 40px 0; min-height: 60vh;">
            <div class="container">
                
                <div th:if="${todoOk}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${todoOk}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Gestión de Solicitudes de Ingreso</h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Candidato</th>
                                        <th>Fecha</th>
                                        <th>Mensaje</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="solicitud : ${solicitudes}">
                                        <td th:text="${solicitud.idSolicitud}"></td>
                                        <td th:text="${solicitud.nombre + ' ' + solicitud.apellidoPaterno + ' ' + (solicitud.apellidoMaterno != null ? solicitud.apellidoMaterno : '')}"></td>
                                        <td th:text="${solicitud.fechaSolicitud}"></td>
                                        <td th:text="${solicitud.mensaje}"></td>
                                        <td class="text-center">
                                            <a th:href="@{/solicitudIngreso/editar/{id}(id=${sol.idSolicitud})}" class="btn btn-info">Editar</a>
                                            <form th:action="@{/solicitudIngreso/eliminar}" method="post" style="display:inline;">
                                                <input type="hidden" name="idSolicitud" th:value="${sol.idSolicitud}">
                                                    <button type="submit" class="btn btn-danger">Eliminar</button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(solicitudes)}">
                                        <td colspan="5" class="text-center text-muted py-4">No hay solicitudes de audición pendientes</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <th:block th:replace="~{general/fragmentos :: footer}"></th:block>
    </body>
</html>
