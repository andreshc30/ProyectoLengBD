<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head>
        <th:block th:replace="~{general/fragmentos :: head}"></th:block>
    </head>
    <body>
        <!-- Contenedor principal con Flexbox -->
        <div id="wrapper" class="d-flex" style="min-height: 100vh;">
            
            <!-- Aquí inyectas tu menú lateral (asumiendo que lo guardaste en fragmentos) -->
            <th:block th:replace="~{general/fragmentos :: admin-sidebar}"></th:block>

            <!-- CONTENIDO DE LA PÁGINA -->
            <div id="content-wrapper" class="flex-grow-1 bg-light w-100 p-4">
                
                <!-- Encabezado y botón Nuevo -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-list me-2"></i>Gestión de [Entidades]</h1>
                    <a th:href="@{/entidad/nuevo}" class="btn btn-primary shadow-sm">
                        <i class="fas fa-plus fa-sm text-white-50"></i> Nuevo Registro
                    </a>
                </div>

                <!-- Alertas de éxito o error (vienen del RedirectAttributes) -->
                <div th:if="${todoOk}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${todoOk}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Tarjeta de la Tabla -->
                <div class="card shadow mb-4">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-bordered align-middle" width="100%" cellspacing="0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre / Descripción</th>
                                        <th>Estado</th>
                                        <th class="text-center" style="width: 150px;">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Iteración de la lista -->
                                    <tr th:each="item : ${lista}">
                                        <td th:text="${item.idEntidad}">1</td>
                                        <td th:text="${item.nombre}">Ejemplo</td>
                                        <td>
                                            <span class="badge bg-success">Activo</span> <!-- Puedes hacer esto dinámico -->
                                        </td>
                                        <td class="text-center">
                                            <!-- Botón Editar -->
                                            <a th:href="@{'/entidad/editar/' + ${item.idEntidad}}" class="btn btn-warning btn-sm" title="Editar">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <!-- Botón Eliminar (Debe ser un form por seguridad) -->
                                            <form th:action="@{/entidad/eliminar}" method="post" class="d-inline">
                                                <input type="hidden" name="idEntidad" th:value="${item.idEntidad}" />
                                                <button type="submit" class="btn btn-danger btn-sm" title="Eliminar" onclick="return confirm('¿Estás seguro de eliminar este registro?');">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <!-- Mensaje si la lista está vacía -->
                                    <tr th:if="${lista == null or lista.isEmpty()}">
                                        <td colspan="4" class="text-center py-4 text-muted">No hay registros disponibles.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

        <th:block th:replace="~{general/fragmentos :: footer}"></th:block>
    </body>
</html>
