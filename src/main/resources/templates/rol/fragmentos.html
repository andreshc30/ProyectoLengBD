<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionRoles">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Roles</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoRol">
                <i class="ti ti-plus"></i> Nuevo rol
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${roles}">
                    <td th:text="${r.nombre}"></td>
                    <td th:text="${r.estado}"></td>
                    <td>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary js-editar"
                                data-bs-toggle="modal" data-bs-target="#modalEditarRol"
                                th:attr="data-id-rol=${r.idRol}, data-nombre=${r.nombre}, data-id-estado=${r.idEstado}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger js-eliminar"
                                data-bs-toggle="modal" data-bs-target="#modalEliminarRol"
                                th:attr="data-id-rol=${r.idRol}, data-nombre-mostrar=${r.nombre}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(roles)}">
                    <td colspan="4" class="text-center text-muted">No hay roles registrados.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nuevo rol -->
        <div class="modal fade" id="modalNuevoRol" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/rol/guardar}" th:object="${nuevoRol}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nuevo rol</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEditarRol" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/rol/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar rol</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idRol">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEliminarRol" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar rol</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar el rol <strong class="js-nombre-registro"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/rol/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idRol">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
