<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head>
        <th:block th:replace="~{general/fragmentos :: head}"></th:block>
    </head>
    <body>
        <div id="wrapper" class="d-flex" style="min-height: 100vh;">
            
            <th:block th:replace="~{general/fragmentos :: admin-sidebar}"></th:block>

            <div id="content-wrapper" class="flex-grow-1 bg-light w-100 p-4">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0 text-gray-800">
                        <i class="fas fa-edit me-2"></i>
                        <span th:text="${pago != null and pago.idPago != null ? 'Editar Pago' : 'Nuevo Pago'}"></span>
                    </h1>
                    <a th:href="@{/pagos/listado}" class="btn btn-secondary shadow-sm">
                        <i class="fas fa-arrow-left fa-sm text-white-50"></i> Volver al listado
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">Detalles del Pago</h6>
                            </div>
                            <div class="card-body">
                                
                                <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post">
                                    
                                    <input type="hidden" th:field="*{idPago}" />

                                    <div class="row mb-3">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Monto ₡ <span class="text-danger">*</span></label>
                                            <input type="number" step="0.01" class="form-control" th:field="*{monto}" required placeholder="Ej: 15000" />
                                        </div>

                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Fecha de Pago <span class="text-danger">*</span></label>
                                            <input type="date" class="form-control" th:field="*{fechaPago}" required />
                                        </div>
                                    </div>

                                    <div class="row mb-4">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Método de Pago</label>
                                            <select class="form-select" th:field="*{idMetodoPago}">
                                                <option value="">-- Seleccione --</option>
                                                <option th:each="metodo : ${metodosPago}" 
                                                        th:value="${metodo.idMetodoPago}" 
                                                        th:text="${metodo.nombre}">
                                                </option>
                                            </select>
                                        </div>

                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-bold">Estado</label>
                                            <select class="form-select" th:field="*{idEstado}">
                                                <option value="">-- Seleccione --</option>
                                                <option th:each="est : ${estados}" 
                                                        th:value="${est.idEstado}" 
                                                        th:text="${est.nombreEstado}">
                                                </option>
                                            </select>
                                        </div>
                                    </div>

                                    <hr>

                                    <div class="d-flex justify-content-end">
                                        <a th:href="@{/pagos/listado}" class="btn btn-outline-secondary me-2">Cancelar</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save me-1"></i> Guardar Pago
                                        </button>
                                    </div>
                                    
                                </form>
                                
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

        <th:block th:replace="~{general/fragmentos :: footer}"></th:block>
    </body>
</html>
