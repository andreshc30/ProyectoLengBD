<!-- Fragmento #1 que irá en el head de todas las páginas, así se incluye todo lo necesario de configuración-->
<head th:fragment="head">
    <title>Gestor de Bandas</title>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/fav/favicon-16x16.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="96x96" href="/fav/favicon-96x96.png"/>
    <link rel="icon" type="image/png" sizes="256x256" href="/fav/favicon-256x256.png"/>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/7.2.0/css/all.css}" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/script.js}"></script>
    <script th:src="@{/webjars/jquery/4.0.0/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/2.11.7/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.min.js}"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>


<!-- Fragmento #2  define el encabezado de las páginas, en concreto el menú y enlaces rápidos -->
<header th:fragment="header" class="header">
    <nav class="navbar navbar-expand-sm p-0 navbar-blcm">
        <div class="container-fluid">                    
            <a th:href="@{/}" class="navbar-brand blcm-title">Inicio</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/banda/listado}">Bandas</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/integrante/listado}">Integrantes</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/ensayo/listado}">Ensayos</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/presentacion/listado}">Presentaciones</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/repertorio/listado}">Repertorio</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/suscripcion/listado}">Suscripción y Pagos</a></li>
                </ul>
                <div id="resultBlock"></div>
            </div>
        </div>
    </nav>
</header>

<!-- Fragmento #3  define el footer de las páginas, aparte de esto se podria incluir enlaces a redes socilaes y demás -->
<footer class="footer-blcm mt-5" th:fragment="footer">
    <div class="container text-center py-4">
        <span>&copy; 2026 Mi Banda</span>
    </div>
</footer>
