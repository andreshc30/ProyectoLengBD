<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionJustificaciones">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Justificaciones</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaJustificacion">
                <i class="ti ti-plus"></i> Nueva justificación
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Motivo</th>
                    <th>Asistencia a ensayo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="j : ${justificaciones}">
                    <td th:text="${j.motivo}"></td>
                    <td th:text="${j.nombreAsistenciaEnsayos}"></td>
                    <td th:text="${j.estado}"></td>
                    <td>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary js-editar"
                                data-bs-toggle="modal" data-bs-target="#modalEditarJustificacion"
                                th:attr="data-id-justificacion=${j.idJustificacion},
                                         data-motivo=${j.motivo},
                                         data-id-asistencia-ensayos=${j.idAsistenciaEnsayos},
                                         data-id-estado=${j.idEstado}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger js-eliminar"
                                data-bs-toggle="modal" data-bs-target="#modalEliminarJustificacion"
                                th:attr="data-id-justificacion=${j.idJustificacion}, data-nombre-mostrar=${j.motivo}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(justificaciones)}">
                    <td colspan="5" class="text-center text-muted">No hay justificaciones registradas.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nueva justificación -->
        <div class="modal fade" id="modalNuevaJustificacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/justificacion/guardar}" th:object="${nuevaJustificacion}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nueva justificación</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Motivo</label>
                                <textarea class="form-control" rows="3" th:field="*{motivo}" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Asistencia a ensayo</label>
                                <select class="form-select" th:field="*{idAsistenciaEnsayos}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="a : ${asistenciasEnsayo}" th:value="${a.idAsistenciaEnsayos}" th:text="${a.nombreEnsayo} + ' - ' + ${a.nombreUsuario}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEditarJustificacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/justificacion/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar justificación</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idJustificacion">
                            <div class="mb-3">
                                <label class="form-label">Motivo</label>
                                <textarea name="motivo" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Asistencia a ensayo</label>
                                <select class="form-select" name="idAsistenciaEnsayos">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="a : ${asistenciasEnsayo}" th:value="${a.idAsistenciaEnsayos}" th:text="${a.nombreEnsayo} + ' - ' + ${a.nombreUsuario}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (UNICO, compartido -- se llena con JS) -->
        <div class="modal fade" id="modalEliminarJustificacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar justificación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar la justificación <strong class="js-nombre-registro"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/justificacion/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idJustificacion">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
