<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionInstrumentos">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Instrumentos</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoInstrumento">
                <i class="ti ti-plus"></i> Nuevo instrumento
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Sección</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="i : ${instrumentos}">
                    <td th:text="${i.nombre}"></td>
                    <td th:text="${i.nombreSeccion}"></td>
                    <td th:text="${i.estado}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${i.idInstrumento}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${i.idInstrumento}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(instrumentos)}">
                    <td colspan="5" class="text-center text-muted">No hay instrumentos registrados.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nuevo instrumento -->
        <div class="modal fade" id="modalNuevoInstrumento" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/instrumento/guardar}" th:object="${nuevoInstrumento}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nuevo instrumento</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sección</label>
                                <select class="form-select" th:field="*{idSeccion}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="s : ${secciones}" th:value="${s.idSeccion}" th:text="${s.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar instrumento (uno por fila) -->
        <div class="modal fade" th:each="i : ${instrumentos}" th:id="'modalEditar-' + ${i.idInstrumento}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/instrumento/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar instrumento</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idInstrumento" th:value="${i.idInstrumento}">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" th:value="${i.nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sección</label>
                                <select class="form-select" name="idSeccion">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="s : ${secciones}" th:value="${s.idSeccion}" th:text="${s.nombre}" th:selected="${s.idSeccion == i.idSeccion}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == i.idEstado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (uno por fila) -->
        <div class="modal fade" th:each="i : ${instrumentos}" th:id="'modalEliminar-' + ${i.idInstrumento}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar instrumento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar el instrumento <strong th:text="${i.nombre}"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/instrumento/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idInstrumento" th:value="${i.idInstrumento}">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
