<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionBandas">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Bandas</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaBanda">
                <i class="ti ti-plus"></i> Nueva banda
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Monto cuota</th>
                    <th>Fecha fundación</th>
                    <th>Dirección</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${bandas}">
                    <td th:text="${b.idBanda}"></td>
                    <td th:text="${b.nombre}"></td>
                    <td th:text="${b.montoCuota}"></td>
                    <td th:text="${#temporals.format(b.fechaFundacion, 'dd/MM/yyyy')}"></td>
                    <td th:text="${b.direccion}"></td>
                    <td th:text="${b.correo}"></td>
                    <td th:text="${b.telefono}"></td>
                    <td th:text="${b.estado}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${b.idBanda}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${b.idBanda}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bandas)}">
                    <td colspan="9" class="text-center text-muted">No hay bandas registradas.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nueva banda -->
        <div class="modal fade" id="modalNuevaBanda" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/bandas/guardar}" th:object="${nuevaBanda}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nueva banda</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Logo (URL)</label>
                                <input type="text" class="form-control" th:field="*{logoUrl}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Monto cuota</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{montoCuota}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha fundación</label>
                                <input type="date" class="form-control" th:field="*{fechaFundacion}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <select class="form-select" th:field="*{idDireccion}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="d : ${direcciones}" th:value="${d.idDireccion}" th:text="${d.otrosDetalles}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <select class="form-select" th:field="*{idCorreo}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="c : ${correos}" th:value="${c.idCorreo}" th:text="${c.correo}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <select class="form-select" th:field="*{idTelefono}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="t : ${telefonos}" th:value="${t.idTelefono}" th:text="${t.telefono}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar banda (uno por fila) -->
        <div class="modal fade" th:each="b : ${bandas}" th:id="'modalEditar-' + ${b.idBanda}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/bandas/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar banda</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idBanda" th:value="${b.idBanda}">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" th:value="${b.nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Logo (URL)</label>
                                <input type="text" name="logoUrl" class="form-control" th:value="${b.logoUrl}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Monto cuota</label>
                                <input type="number" step="0.01" name="montoCuota" class="form-control" th:value="${b.montoCuota}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha fundación</label>
                                <input type="date" name="fechaFundacion" class="form-control" th:value="${b.fechaFundacion}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <select class="form-select" name="idDireccion">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="d : ${direcciones}" th:value="${d.idDireccion}" th:text="${d.otrosDetalles}" th:selected="${d.idDireccion == b.idDireccion}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <select class="form-select" name="idCorreo">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="c : ${correos}" th:value="${c.idCorreo}" th:text="${c.correo}" th:selected="${c.idCorreo == b.idCorreo}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <select class="form-select" name="idTelefono">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="t : ${telefonos}" th:value="${t.idTelefono}" th:text="${t.telefono}" th:selected="${t.idTelefono == b.idTelefono}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == b.idEstado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (uno por fila) -->
        <div class="modal fade" th:each="b : ${bandas}" th:id="'modalEliminar-' + ${b.idBanda}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar banda</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar la banda <strong th:text="${b.nombre}"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/bandas/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idBanda" th:value="${b.idBanda}">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
