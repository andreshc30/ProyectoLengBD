<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head>
        <th:block th:replace="~{general/fragmentos :: head}"></th:block>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
        
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-white">
        <div class="flex h-[700px] w-full">

            <div class="flex min-h-screen w-full">
                <div class="w-full hidden md:inline-block">
                    <img class="h-full w-full object-cover" th:src="@{/img/imgA.jpg}" alt="leftSideImage">
                </div>

            <div class="w-full flex flex-col items-center justify-center">

                <form th:action="@{/procesar-login}" method="post" class="md:w-96 w-80 flex flex-col items-center justify-center">
                    <h2 class="text-4xl text-gray-900 font-medium">Sign in</h2>
                    <p class="text-sm text-gray-500/90 mt-3">Bienvenido de Vuelta!</p>

                    <div class="flex items-center w-full mt-8 border border-gray-300 rounded-lg h-12 pl-4 gap-2 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500">
                        <i class="ti ti-user text-gray-400"></i>
                        <input type="text" name="username" placeholder="Usuario"
                               class="bg-transparent outline-none w-full h-full" required>
                    </div>

                    <div class="flex items-center mt-6 w-full border border-gray-300 rounded-lg h-12 pl-4 gap-2 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500">
                        <i class="ti ti-lock text-gray-400"></i>
                        <input type="password" name="password" placeholder="Password"
                               class="bg-transparent outline-none w-full h-full" required>
                    </div>

                    <div class="w-full flex items-center justify-between mt-8 text-gray-500/80">
                        <div class="flex items-center gap-2">
                            <input class="h-4 w-4 text-indigo-500 rounded border-gray-300" type="checkbox" id="checkbox">
                            <label class="text-sm" for="checkbox">Remember me</label>
                        </div>
                        <a class="text-sm underline hover:text-indigo-500" href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="mt-8 w-full h-11 rounded-full text-white bg-indigo-500 hover:bg-indigo-600 transition-colors font-medium">
                        Login
                    </button>
                    
                    <p class="text-gray-500/90 text-sm mt-4">Don’t have an account? <a class="text-indigo-500 hover:underline font-medium" href="#">Sign up</a></p>
                </form>
            </div>
        </div>
    </body>
</html>
