<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head>
        <th:block th:replace="~{general/fragmentos :: head}"></th:block>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    </head>

    <body>
        <header>
            <div class="Center">
                <div class="site-logo">
                    <h1><a th:href="@{/}">BandCore</a></h1>
                </div>

                <nav class="Navigation">
                    <ul>
                        <li><a th:href="@{/}">Inicio</a><span class="menu-item-bg"></span></li>
                        <li><a th:href="@{/audiciones/listado}">Audiciones</a><span class="menu-item-bg"></span></li>
                        <li><a th:href="@{/banda/listado}">Banda</a><span class="menu-item-bg"></span></li>
                        <li><a th:href="@{/eventos/listado}">Eventos</a><span class="menu-item-bg"></span></li>
                        <li class="active"><a th:href="@{/suscripcion/listado}">Suscripción</a><span class="menu-item-bg"></span></li>
                    </ul>
                </nav>
                <div id="mobile_sec">
                    <div class="mobile"><i class="fa fa-bars"></i><i class="fa fa-times"></i></div>
                </div>
                <div class="clear"></div>
            </div>
        </header>

        <section class="checkout">
            <div class="checkout-card">
                <div class="checkout-header mb-4 text-center">
                    <h2>Completar Suscripción</h2>
                    <p>Estás a un paso de unirte al plan <strong th:text="${planSeleccionado}"></strong></p>
                </div>
                
                <div class="plan-box d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded">
                    <div>
                        <h5 class="mb-0" th:text="${planSeleccionado}"></h5>
                        <small class="text-muted">Facturación mensual</small>
                    </div>
                    <div class="precio fw-bold fs-4">₡7 500</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Método de pago</label>
                    <select id="metodoPago" class="form-select" onchange="mostrarCampos()">
                        <option value="">Seleccione...</option>
                        <option value="tarjeta">💳 Tarjeta</option>
                        <option value="sinpe">📱 SINPE Móvil</option>
                    </select>
                </div>

                <div id="camposTarjeta" style="display:none;">
                    <div class="credit-card">
                        <div class="chip"></div>
                        <div class="numero">•••• •••• •••• ••••</div>
                        <div class="bottom-card">
                            <span>NOMBRE</span> <span>12/28</span>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>Número de tarjeta</label>
                        <input class="form-control" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="row mt-3">
                        <div class="col-8"><label>Nombre</label><input class="form-control"></div>
                        <div class="col-4"><label>CVV</label><input class="form-control" placeholder="123"></div>
                    </div>
                </div>

                <div id="camposSinpe" style="display:none;">
                    <div class="sinpe-box">
                        <i class="ti ti-device-mobile fs-1"></i>
                        <h4 class="mt-2">SINPE Móvil</h4>
                        <p class="small">Realice el pago al 8888-8888 y confirme aquí:</p>
                        <input class="form-control text-center" placeholder="Número de confirmación">
                    </div>
                </div>

                <div class="resumen">
                    <span>Total a pagar</span>
                    <strong>₡7 500</strong>
                </div>
                
                <button class="btn-pagar">
                    <i class="ti ti-lock"></i> Confirmar pago seguro
                </button>
            </div>
        </section>

        <script>
            function mostrarCampos() {
                let metodo = document.getElementById("metodoPago").value;
                document.getElementById("camposTarjeta").style.display =
                        metodo === "tarjeta" ? "block" : "none";
                document.getElementById("camposSinpe").style.display =
                        metodo === "sinpe" ? "block" : "none";
            }
        </script>
    </body>
</html>
