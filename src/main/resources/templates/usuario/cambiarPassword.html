<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{general/fragmentos :: head}"></th:block>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Cambiar contraseña</h4>
                    </div>
                    <div class="card-body">

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>

                        <form th:action="@{/usuario/cambiarPassword}" method="post">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Contraseña actual:</label>
                                <input type="password" class="form-control" name="actual" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nueva contraseña:</label>
                                <input type="password" class="form-control" name="nueva" minlength="8" required>
                                <small class="text-muted">Mínimo 8 caracteres</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Confirmar nueva contraseña:</label>
                                <input type="password" class="form-control" name="confirmar" minlength="8" required>
                            </div>

                            <div class="text-end">
                                <a th:href="@{/banda/listado}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
