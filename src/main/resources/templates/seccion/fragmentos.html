<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionSecciones">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Secciones</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaSeccion">
                <i class="ti ti-plus"></i> Nueva sección
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Banda</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${secciones}">
                    <td th:text="${s.nombre}"></td>
                    <td th:text="${s.descripcion}"></td>
                    <td th:text="${s.nombreBanda}"></td>
                    <td th:text="${s.estado}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${s.idSeccion}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${s.idSeccion}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(secciones)}">
                    <td colspan="6" class="text-center text-muted">No hay secciones registradas.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nueva sección -->
        <div class="modal fade" id="modalNuevaSeccion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/seccion/guardar}" th:object="${nuevaSeccion}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nueva sección</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Banda</label>
                                <select class="form-select" th:field="*{idBanda}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="b : ${bandas}" th:value="${b.idBanda}" th:text="${b.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar sección (uno por fila) -->
        <div class="modal fade" th:each="s : ${secciones}" th:id="'modalEditar-' + ${s.idSeccion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/seccion/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar sección</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idSeccion" th:value="${s.idSeccion}">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" th:value="${s.nombre}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <textarea name="descripcion" class="form-control" rows="3" th:text="${s.descripcion}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Banda</label>
                                <select class="form-select" name="idBanda">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="b : ${bandas}" th:value="${b.idBanda}" th:text="${b.nombre}" th:selected="${b.idBanda == s.idBanda}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == s.idEstado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (uno por fila) -->
        <div class="modal fade" th:each="s : ${secciones}" th:id="'modalEliminar-' + ${s.idSeccion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar sección</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar la sección <strong th:text="${s.nombre}"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/seccion/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idSeccion" th:value="${s.idSeccion}">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
