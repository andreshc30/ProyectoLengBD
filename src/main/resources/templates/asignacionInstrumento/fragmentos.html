<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="gestionAsignaciones">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Asignación de instrumentos</h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaAsignacion">
                <i class="ti ti-plus"></i> Nueva asignación
            </button>
        </div>

        <table class="table table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>Integrante</th>
                    <th>Instrumento</th>
                    <th>Fecha inicio</th>
                    <th>Fecha final</th>
                    <th>Motivo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${asignaciones}">
                    <td th:text="${a.nombreIntegrante}"></td>
                    <td th:text="${a.nombreInstrumento}"></td>
                    <td th:text="${#temporals.format(a.fechaInicio, 'dd/MM/yyyy')}"></td>
                    <td th:text="${a.fechaFinal != null} ? ${#temporals.format(a.fechaFinal, 'dd/MM/yyyy')} : '-'"></td>
                    <td th:text="${a.motivo}"></td>
                    <td th:text="${a.nombreEstado}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#modalEditar-' + ${a.idAsignacion}">
                            <i class="ti ti-edit"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#modalEliminar-' + ${a.idAsignacion}">
                            <i class="ti ti-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(asignaciones)}">
                    <td colspan="8" class="text-center text-muted">No hay asignaciones registradas.</td>
                </tr>
            </tbody>
        </table>

        <!-- Modal: nueva asignación -->
        <div class="modal fade" id="modalNuevaAsignacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asignacionInstrumento/guardar}" th:object="${nuevaAsignacion}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Nueva asignación</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" th:field="*{cedula}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Instrumento</label>
                                <select class="form-select" th:field="*{idInstrumento}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="i : ${instrumentos}" th:value="${i.idInstrumento}" th:text="${i.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha inicio</label>
                                <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha final</label>
                                <input type="date" class="form-control" th:field="*{fechaFinal}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Motivo</label>
                                <textarea class="form-control" rows="3" th:field="*{motivo}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{idEstado}">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: editar asignación (uno por fila) -->
        <div class="modal fade" th:each="a : ${asignaciones}" th:id="'modalEditar-' + ${a.idAsignacion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/asignacionInstrumento/guardar}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar asignación</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="idAsignacion" th:value="${a.idAsignacion}">
                            <div class="mb-3">
                                <label class="form-label">Integrante (cédula)</label>
                                <select class="form-select" name="cedula">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}" th:value="${u.cedula}" th:text="${u.nombre} + ' ' + ${u.primerApellido}" th:selected="${u.cedula == a.cedula}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Instrumento</label>
                                <select class="form-select" name="idInstrumento">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="i : ${instrumentos}" th:value="${i.idInstrumento}" th:text="${i.nombre}" th:selected="${i.idInstrumento == a.idInstrumento}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha inicio</label>
                                <input type="date" name="fechaInicio" class="form-control" th:value="${a.fechaInicio}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha final</label>
                                <input type="date" name="fechaFinal" class="form-control" th:value="${a.fechaFinal}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Motivo</label>
                                <textarea name="motivo" class="form-control" rows="3" th:text="${a.motivo}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" name="idEstado">
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="es : ${estados}" th:value="${es.idEstado}" th:text="${es.estado}" th:selected="${es.idEstado == a.idEstado}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal: confirmar eliminación (uno por fila) -->
        <div class="modal fade" th:each="a : ${asignaciones}" th:id="'modalEliminar-' + ${a.idAsignacion}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar asignación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Estás seguro de que querés eliminar esta asignación de <strong th:text="${a.nombreIntegrante}"></strong>? Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form th:action="@{/asignacionInstrumento/eliminar}" method="post" class="d-inline">
                            <input type="hidden" name="idAsignacion" th:value="${a.idAsignacion}">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
